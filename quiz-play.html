<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

.quiz-container{
padding:20px;
}

.progress{
margin-bottom:20px;
}

.progress-bar{
width:100%;
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#4CAF50;
transition:.3s;
}

.question-card{

background:#fff;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

margin-bottom:20px;

text-align:center;

}

.question-card h2{

font-size:32px;

margin:20px 0;

}

.answers{

display:flex;

flex-direction:column;

gap:12px;

}

.answer{

padding:15px;

border:none;

border-radius:12px;

font-size:16px;

cursor:pointer;

background:#f3f3f3;

transition:.2s;

}

.answer:hover{

background:#e5e5e5;

}

.correct{

background:#4CAF50!important;

color:white;

}

.wrong{

background:#f44336!important;

color:white;

}

.next-btn{

width:100%;

margin-top:20px;

padding:15px;

border:none;

border-radius:12px;

background:#2196F3;

color:white;

font-size:18px;

cursor:pointer;

display:none;

}

.result{

display:none;

text-align:center;

padding:30px;

}

.result h1{

font-size:48px;

color:#4CAF50;

}

.play-again{

margin-top:20px;

padding:15px 25px;

border:none;

border-radius:12px;

background:#4CAF50;

color:white;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="phone">

<header class="page-header">

<a href="quiz.html" class="back">

<i class="fa-solid fa-arrow-left"></i>

</a>

<h2 id="quizTitle">Quiz</h2>

</header>

<div class="quiz-container">

<div class="progress">

<div style="display:flex;justify-content:space-between;">

<span id="number">1/10</span>

<span id="score">Score : 0</span>

</div>

<div class="progress-bar">

<div class="progress-fill" id="progress"></div>

</div>

</div>

<div class="question-card">

<h3 id="questionText">Loading...</h3>

<h2 id="question"></h2>

<div class="answers" id="answers"></div>

<button class="next-btn" id="nextBtn">
Soal Berikutnya
</button>

</div>

<div class="result" id="result">

<h1 id="finalScore">0</h1>

<h3>Quiz Selesai 🎉</h3>

<p id="message"></p>

<button class="play-again"
onclick="location.reload()">

Main Lagi

</button>

</div>

</div>

</div>

<script src="data/quiz/hiragana.js"></script>
<script src="data/quiz/katakana.js"></script>
<script src="data/quiz/vocabulary.js"></script>
<script src="data/quiz/grammar.js"></script>
<script src="data/quiz/conversation.js"></script>

<script>

    
    

const params=new URLSearchParams(window.location.search);

const type=params.get("type");

let questions=[];

switch(type){

case "hiragana":
questions=hiraganaQuiz;
document.getElementById("quizTitle").innerHTML="Quiz Hiragana";
break;

case "katakana":
questions=katakanaQuiz;
document.getElementById("quizTitle").innerHTML="Quiz Katakana";
break;

case "vocabulary":
questions=vocabularyQuiz;
document.getElementById("quizTitle").innerHTML="Quiz Vocabulary";
break;

case "grammar":
questions=grammarQuiz;
document.getElementById("quizTitle").innerHTML="Quiz Grammar";
break;

case "conversation":
questions=conversationQuiz;
document.getElementById("quizTitle").innerHTML="Quiz Conversation";
break;

default:
questions=hiraganaQuiz;

}

let current=0;

let score=0;

const total = questions.length;

const question=document.getElementById("question");

const text=document.getElementById("questionText");

const answers=document.getElementById("answers");

const next=document.getElementById("nextBtn");

function loadQuestion(){

const q=questions[current];

text.innerHTML=q.text;

question.innerHTML=q.question;

answers.innerHTML="";

document.getElementById("number").innerHTML=

`${current+1}/${total}`;

document.getElementById("progress").style.width=

((current)/total*100)+"%";

q.options.sort(()=>Math.random()-0.5);

q.options.forEach(option=>{

const btn=document.createElement("button");

btn.className="answer";

btn.innerHTML=option;

btn.onclick=()=>checkAnswer(btn,option);

answers.appendChild(btn);

});

next.style.display="none";

}

function checkAnswer(button,answer){

const q=questions[current];

document.querySelectorAll(".answer").forEach(btn=>{

btn.disabled=true;

if(btn.innerHTML==q.correct){

btn.classList.add("correct");

}

});

if(answer==q.correct){

score++;

document.getElementById("score").innerHTML="Score : "+score;

}else{

button.classList.add("wrong");

}

next.style.display="block";

}

next.onclick=function(){

current++;

if(current>=total){

finishQuiz();

}else{

loadQuestion();

}

}

function finishQuiz(){

document.querySelector(".question-card").style.display="none";

document.querySelector(".progress").style.display="none";

document.getElementById("result").style.display="block";

document.getElementById("finalScore").innerHTML = score+" / "+total;

let pesan="";

if(score==total){

pesan="Luar biasa! 🎉";

}else if(score>=total*0.8){

pesan="Bagus sekali! 👍";

}else if(score>=total*0.6){

pesan="Lumayan, terus belajar 😊";

}else{

pesan="Semangat belajar lagi 💪";

}

document.getElementById("message").innerHTML = pesan;

// ======================
// Simpan High Score
// ======================

const oldScore = Number(localStorage.getItem("highscore")) || 0;

if(score > oldScore){

localStorage.setItem("highscore", score);

}

// ======================
// Hitung jumlah quiz
// ======================

let totalQuiz = Number(localStorage.getItem("quizcount")) || 0;

totalQuiz++;

localStorage.setItem("quizcount", totalQuiz);

}

loadQuestion();

</script>

</body>

</html>
